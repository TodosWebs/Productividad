<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#edf5ff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Equilibrio" />
  <title>Equilibrio · Organizador personal</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="assets/icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="app" class="app-shell">
    <aside class="sidebar" aria-label="Navegación principal">
      <div class="brand">
        <div class="brand-mark">EQ</div>
        <div>
          <div class="brand-title">Equilibrio</div>
          <div class="brand-subtitle">Productividad · Salud · Finanzas</div>
        </div>
      </div>

      <nav class="nav" id="desktopNav"></nav>

      <div class="sidebar-footer">
        <button class="ghost-btn full" onclick="App.openOnboarding(true)">⚙️ Editar preguntas iniciales</button>
        <button class="ghost-btn full" onclick="App.exportBackup()">↓ Backup JSON</button>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <p class="eyebrow" id="topEyebrow">Tu día, en equilibrio</p>
          <h1 id="pageTitle">Dashboard</h1>
          <p class="page-sub" id="pageSub">Agenda, tareas, deporte, hábitos, comida, reflexión y economía en un solo sitio.</p>
        </div>
        <div class="top-actions">
          <button class="soft-btn" onclick="App.quickAdd()">+ Añadir rápido</button>
          <button class="primary-btn" onclick="App.generateDailyPlan()">✨ Plan del día</button>
        </div>
      </header>

      <section id="view" class="view"></section>
    </main>

    <nav class="mobile-nav" id="mobileNav" aria-label="Navegación móvil"></nav>
  </div>

  <div id="modalRoot"></div>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="js/data.js" defer></script>
  <script src="js/ai.js" defer></script>
  <script src="js/app.js" defer></script>
</body>
</html>
